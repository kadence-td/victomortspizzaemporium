<div class="cart-container">
  <h1>Your Cart</h1>

  <!-- empty cart message -->
  @if (items.length === 0) {
    <div class="empty-cart">
      <p>Your cart is empty!</p>
      <button mat-raised-button color="primary" (click)="goToMenu()">Browse Menu</button>
    </div>
  } 
  
  <!-- cart items and summary -->
  @else {
    <div class="cart-layout">
      <mat-card class="cart-items">
        @for (item of items; track item.pizza.id) {
          <app-cart-item
            [item]="item"
            (quantityChange)="onQuantityChange(item, $event)"
            (removeItem)="onRemoveItem(item)"
          />
        }
      </mat-card>
      <div class="cart-sidebar">
        <app-order-summary [items]="items" />
        <button mat-raised-button color="primary" class="checkout-btn" (click)="goToCheckout()">
          Proceed to Checkout
        </button>
      </div>
    </div>
  }
</div>
