<div class="order-summary">
  <h3>Order Summary</h3>
  <mat-divider />
  <div class="summary-row">
    <span>Subtotal</span>
    <span>${{ subtotal.toFixed(2) }}</span>
  </div>
  <div class="summary-row">
    <span>Tax (6%)</span>
    <span>${{ tax.toFixed(2) }}</span>
  </div>
  <mat-divider />
  <div class="summary-row total">
    <span>Total</span>
    <span>${{ total.toFixed(2) }}</span>
  </div>
</div>
